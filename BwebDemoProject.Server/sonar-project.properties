sonar.projectKey=bweb-testing_sonar-testing
sonar.organization=bweb-testing

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=sonar-testing
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\\" by "/" on Windows.
sonar.sources=.

# Exclude common directories that shouldn't be analyzed
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/.github/**,**/coverage/**,**/*.test.js,**/*.spec.js

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# JavaScript/TypeScript specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
