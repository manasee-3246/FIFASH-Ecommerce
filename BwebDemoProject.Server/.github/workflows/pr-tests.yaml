name: PR Unit Tests

on:
    pull_request:
        branches:
            - develop
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write
    checks: write

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Install test dependencies
              run: npm install jest-junit jest supertest

            - name: Run tests
              id: test
              run: |
                  npm test 2>&1 | tee test-output.txt
                  echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
              continue-on-error: true

            - name: Post test results
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const testOutput = fs.readFileSync('test-output.txt', 'utf8');
                      const exitCode = '${{ steps.test.outputs.exit_code }}';
                      const success = exitCode === '0';

                      // Extract test summary
                      const lines = testOutput.split('\n');
                      const testSuiteLine = lines.find(l => l.includes('Test Suites:')) || 'Test Suites: Unknown';
                      const testLine = lines.find(l => l.includes('Tests:') && l.includes('total')) || 'Tests: Unknown';
                      const timeLine = lines.find(l => l.includes('Time:')) || 'Time: Unknown';

                      const status = success ? '✅ PASSED' : '❌ FAILED';
                      const emoji = success ? '🎉' : '💥';

                      const body = `## ${emoji} Unit Test Results

                      **Status:** ${status}

                      **Summary:**
                      - ${testSuiteLine}
                      - ${testLine}
                      - ${timeLine}

                      <details>
                      <summary>📋 Full Test Output</summary>

                      \`\`\`
                      ${testOutput}
                      \`\`\`

                      </details>

                      ---
                      *Node.js 20 • Commit: ${context.sha.substring(0, 7)} • Author: @${context.actor}*`;

                      // Check for existing comment
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existingComment = comments.find(comment =>
                        comment.user.type === 'Bot' && comment.body.includes('Unit Test Results')
                      );

                      if (existingComment) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existingComment.id,
                          body: body
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body: body
                        });
                      }

            - name: Fail if tests failed
              if: steps.test.outputs.exit_code != '0'
              run: exit 1
